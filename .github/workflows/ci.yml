name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit & widget tests
        run: flutter test --machine > test-results.json

      - name: Upload test report
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-results
          path: test-results.json

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm
          ls -la /dev/kvm

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Cache Android emulator
        uses: actions/cache@v5
        with:
          path: |
            ~/.android/avd
            ~/.android/avd/*.avd/*.qcow2
            /usr/local/lib/android/sdk/emulator
          key: ${{ runner.os }}-avd-${{ hashFiles('**/pubspec.yaml') }}-${{ hashFiles('**/integration_test/**') }}
          restore-keys: |
            ${{ runner.os }}-avd-

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_2
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: |
            flutter test integration_test/ --machine > integration-results.json

      - name: Upload screenshots
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: integration-screenshots
          path: screenshots/

      - name: Upload integration test report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: integration-test-results
          path: integration-results.json