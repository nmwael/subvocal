name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit & widget tests
        run: flutter test --machine 2>/dev/null | grep '^{' > test-results.json

      - name: Upload test report
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-results.json

      - name: Unit Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Flutter Unit Tests
          path: test-results.json
          reporter: flutter-json
          use-actions-summary: false
          fail-on-error: false

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm
          ls -la /dev/kvm

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Cache Android emulator
        uses: actions/cache@v6
        with:
          path: |
            ~/.android/avd
            ~/.android/avd/*.avd/*.qcow2
            /usr/local/lib/android/sdk/emulator
          key: ${{ runner.os }}-avd-${{ hashFiles('**/pubspec.yaml') }}-${{ hashFiles('**/integration_test/**') }}
          restore-keys: |
            ${{ runner.os }}-avd-

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_2
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot-load -no-snapshot-save -no-wifi -memory 2048
          disable-animations: true
          emulator-boot-timeout: 120
          script: |
            adb logcat -c
            flutter test integration_test/ --machine --dart-define=OPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }} 2>/dev/null | grep '^{' > integration-results.json
            python3 scripts/extract_screenshots.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-screenshots
          path: screenshots/

      - name: Upload integration test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results
          path: integration-results.json

      - name: Integration Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Flutter Integration Tests
          path: integration-results.json
          reporter: flutter-json
          use-actions-summary: false
          fail-on-error: false


